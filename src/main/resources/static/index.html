<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
          margin: 0;
          font-family: 'Inter', sans-serif;
          background: #0f172a;
          color: #e2e8f0;
        }

        .app {
          display: flex;
          flex-direction: column;
          height: 100vh;
          max-width: 900px;
          margin: auto;
        }

        .header {
          padding: 16px;
          font-weight: 600;
          border-bottom: 1px solid #1e293b;
        }

        /* Chat */
        .chat {
          flex: 1;
          overflow-y: auto;
          padding: 20px;
        }

        .msg {
          display: flex;
          gap: 10px;
          margin-bottom: 18px;
        }

        .user { justify-content: flex-end; }
        .ai { justify-content: flex-start; }

        .bubble {
          max-width: 70%;
          padding: 14px 16px;
          border-radius: 12px;
          line-height: 1.6;
        }

        .user .bubble {
          background: linear-gradient(135deg, #6366f1, #8b5cf6);
          color: white;
        }

        .ai .bubble {
          background: rgba(255,255,255,0.05);
          border: 1px solid rgba(255,255,255,0.08);
        }

        .avatar {
          width: 32px;
          height: 32px;
          border-radius: 50%;
          background: #334155;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        /* Buttons */
        .action-buttons {
          margin-top: 10px;
        }

        .action-buttons button {
          background: #1e293b;
          border: 1px solid #334155;
          color: #e2e8f0;
          padding: 6px 10px;
          margin-right: 8px;
          border-radius: 6px;
          cursor: pointer;
          font-size: 12px;
        }

        .action-buttons button:hover {
          background: #334155;
        }

        /* Input */
        .input-area {
          display: flex;
          gap: 10px;
          padding: 12px;
          border-top: 1px solid #1e293b;
        }

        textarea {
          flex: 1;
          border: none;
          border-radius: 8px;
          padding: 10px;
          background: #1e293b;
          color: white;
          resize: none;
        }

        select {
          background: #1e293b;
          color: white;
          border: 1px solid #334155;
          border-radius: 8px;
          padding: 8px;
        }

        button.send-btn {
          background: #6366f1;
          border: none;
          border-radius: 8px;
          padding: 10px;
          color: white;
          cursor: pointer;
        }
    </style>
</head>

<body>

<div class="app">
    <div class="header">✨ Email AI Assistant</div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <textarea id="input" placeholder="Paste email..."></textarea>

        <select id="tone">
            <option value="formal">Formal</option>
            <option value="casual">Casual</option>
            <option value="friendly">Friendly</option>
        </select>

        <button class="send-btn" onclick="send()">Send</button>
    </div>
</div>

<script>
    let lastText = "";
    let lastTone = "";

    // Add message
    function addMsg(text, type, loading = false) {
      const chat = document.getElementById("chat");

      const wrap = document.createElement("div");
      wrap.className = "msg " + type;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.innerText = type === "user" ? "U" : "AI";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      wrap.appendChild(avatar);
      wrap.appendChild(bubble);

      if (type === "user") {
        bubble.innerText = text;
      }

      if (type === "ai") {
        if (loading) {
          bubble.innerText = "Thinking...";
        } else {
          // ✅ Proper formatting
          bubble.innerHTML = text.replace(/\n/g, "<br>");

          const actions = document.createElement("div");
          actions.className = "action-buttons";

          // Copy button
          const copyBtn = document.createElement("button");
          copyBtn.innerText = "Copy";
          copyBtn.onclick = () => {
            navigator.clipboard.writeText(text);
            copyBtn.innerText = "Copied!";
            setTimeout(() => copyBtn.innerText = "Copy", 1500);
          };

          // Regenerate button
          const regenBtn = document.createElement("button");
          regenBtn.innerText = "Regenerate";
          regenBtn.onclick = () => send(lastText, lastTone, true);

          actions.appendChild(copyBtn);
          actions.appendChild(regenBtn);

          bubble.appendChild(actions);
        }
      }

      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    // Send function
    function send(customText = null, customTone = null, regen = false) {
      console.log("Send clicked");

      const input = document.getElementById("input");
      const tone = customTone || document.getElementById("tone").value;
      const text = customText || input.value;

      if (!text.trim()) return;

      if (!regen) {
        addMsg(text, "user");
        input.value = "";
      }

      lastText = text;
      lastTone = tone;

      addMsg("", "ai", true);

      fetch("/api/email/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ emailContent: text, tone: tone })
      })
      .then(res => {
        if (!res.ok) throw new Error("API error");
        return res.text();
      })
      .then(data => {
        document.getElementById("chat").lastChild.remove();
        addMsg(data, "ai");
      })
      .catch(err => {
        console.error(err);
        addMsg("Error generating response", "ai");
      });
    }

    // Enter to send
    document.getElementById("input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
</script>

</body>
</html>
